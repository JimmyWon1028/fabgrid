<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>fabui.Diagram Demo</title>
  <script src="../dist/fabLoader.js?v=20260724-loader-v14"></script>
  <style>
    body {
      max-width: 1440px;
      margin: 0 auto;
      padding: 22px 18px 40px;
      background: var(--fg-cell-bg, #fff);
      color: var(--fg-cell-text, #333);
      font: 14px Arial, sans-serif;
    }
    h1 { margin: 0 0 8px; }
    .demo-toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      margin: 16px 0;
      padding: 10px;
      border: 1px solid var(--fg-border, #ddd);
      background: var(--fg-header-bg, #fafafa);
    }
    #diagram-status {
      min-height: 20px;
      margin: 10px 0;
      color: var(--fg-muted-text, #666);
    }
  </style>
</head>
<body class="fg-theme-default">
  <h1>fabui.Diagram Demo</h1>
  <p>Pure JavaScript SVG 圖表設計器：拖曳工具箱圖形到畫布，選取後可移動、縮放、修改屬性或建立連線。</p>
  <div class="demo-toolbar">
    <label for="diagram-theme">主題</label>
    <select id="diagram-theme">
      <option value="default" selected>Default</option>
      <option value="bootstrap">Bootstrap</option>
      <option value="cupertino">Cupertino</option>
      <option value="material">Material</option>
      <option value="material-blue">Material Blue</option>
      <option value="material-teal">Material Teal</option>
      <option value="metro">Metro</option>
      <option value="metro-blue">Metro Blue</option>
      <option value="metro-gray">Metro Gray</option>
      <option value="metro-green">Metro Green</option>
      <option value="metro-orange">Metro Orange</option>
      <option value="metro-red">Metro Red</option>
      <option value="sunny">Sunny</option>
      <option value="pepper-grinder">Pepper Grinder</option>
      <option value="dark-hive">Dark Hive</option>
      <option value="black">Black</option>
      <option value="mono">Mono</option><option value="mono-red">Mono Red</option><option value="mono-green">Mono Green</option>
    </select>
    <label for="diagram-locale">語系</label>
    <select id="diagram-locale">
      <option value="zh-TW" selected>繁體中文</option>
      <option value="zh-CN">簡體中文</option>
      <option value="en">English</option>
    </select>
    <label for="diagram-dock-mode">同側排列</label>
    <select id="diagram-dock-mode">
      <option value="tabs" selected>Tabs</option>
      <option value="stacked">上下排列</option>
    </select>
    <label><input id="diagram-readonly" type="checkbox"> 唯讀</label>
    <a data-fabui-button href="javascript:void(0)" id="diagram-fit">符合內容</a>
    <a data-fabui-button href="javascript:void(0)" id="diagram-reset">還原範例</a>
    <a data-fabui-button href="javascript:void(0)" id="diagram-export-json">匯出 JSON</a>
    <a data-fabui-button href="javascript:void(0)" id="diagram-export-svg">匯出 SVG</a>
  </div>
  <div id="diagram-status" aria-live="polite">點擊空白處可在屬性面板設定紙張；放大超出範圍後可拖曳空白處平移，按住 Shift／Ctrl／Cmd 拖曳可框選。</div>
  <div id="diagram"></div>
  <div id="test"></div>

  <script>
    window.fabLoader
      .style([
        '../dist/fabui.css?v=20260722-theme-css-split-v1',
        '../dist/fabui.diagram.css?v=20260722-diagram-bundle-name-v1'
      ])
      .script([
        'https://cdn.jsdelivr.net/npm/dayjs@1.11.13/dayjs.min.js',
        '../dist/fabui.min.js'
      ])
      .run(function() {
        var status = document.getElementById('diagram-status');
        status.setAttribute('data-cdn-dayjs', 'loaded');
        status.textContent += '｜CDN Day.js：載入成功 ' +
          window.dayjs('2026-07-23').format('YYYY/MM/DD');
      })
      .script('./js/theme-loader.js?v=20260722-theme-reload-v1')
      .run(function() {
        var themeLink = document.querySelector('link[data-fabui-theme]');
        if (themeLink) document.head.appendChild(themeLink);
      })
      .script(
        '../dist/fabui.diagram.min.js?v=20260722-diagram-bundle-name-v1'
      )
      .script('./js/diagram-demo.js?v=20260721-mono-variants-v1')
      .run(function() {
        window.mountFabUIDiagramDemo(window.fabui);
      })
      .module('./js/dist-controls.js?v=20260721-mono-variants-v1')
      .run(function() {
        return window.fabLoader.mountHtml('#test', './test.html');
      })
      .catch(function(error) {
        document.getElementById('diagram-status').textContent =
          '載入失敗：' + error.message;
      });
  </script>
</body>
</html>
