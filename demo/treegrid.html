<!doctype html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FabGrid TreeGrid Build Demo</title>
  <link rel="stylesheet" href="../dist/fabui.css?v=20260715-treegrid-v1">
  <link rel="stylesheet" href="./style/treegrid.css?v=20260715-treegrid-controls-v1">
</head>
<body class="fg-theme-default">
  <main class="tree-page">
    <header class="tree-header">
      <div>
        <h1>FabGrid TreeGrid Build</h1>
        <p>Build-mode：只引用 dist browser global bundle，展示 childItemsPath 樹狀資料。</p>
      </div>
      <div class="tree-actions">
        <a id="collapseTree" href="javascript:void(0)">全部收合</a>
        <a id="expandTree" href="javascript:void(0)">全部展開</a>
      </div>
    </header>

    <section class="tree-card">
      <div id="treeGrid"></div>
      <div class="tree-footer">
        <div class="tree-status">
          <span id="treeRowCount">目前可視節點：-</span>
          <span id="treeLastAction">準備中</span>
        </div>
        <label class="tree-filter-control">
          <span>篩選:</span>
          <span class="tree-filter-input-wrap">
            <input
              id="treeQuickSearch"
              type="search"
              placeholder="逗號分隔條件，例如 團隊,啟用"
              autocomplete="off"
            >
            <a
              id="treeQuickSearchMode"
              class="tree-filter-mode"
              aria-label="OR"
              title="OR"
             href="javascript:void(0)">OR</a>
            <a
              id="treeQuickSearchClear"
              aria-label="清除篩選"
              title="清除篩選"
             href="javascript:void(0)">🧹</a>
          </span>
        </label>
      </div>
    </section>
    <p class="tree-note">本頁供 build 後驗證；核心、資料與互動均未依賴 res/TreeGrid。</p>
  </main>

  <script src="../dist/fabui.min.js?v=20260715-treegrid-v1"></script>
  <script src="./js/treegrid-data.js?v=20260715-treegrid-v1"></script>
  <script src="./js/treegrid.js?v=20260715-top-left-row-header-v1"></script>
  <script type="module" src="./js/dist-controls.js?v=20260719-all-demos-v1"></script>
</body>
</html>
