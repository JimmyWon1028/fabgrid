<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FabUI NumberBox Demo</title>
  <link rel="stylesheet" href="../src/fabui.css?v=20260711-component-themes-v1">
  <link rel="stylesheet" href="./component-source.css?v=20260711-component-themes-v5">
  <link rel="stylesheet" href="./component-themes.css?v=20260711-component-themes-v3">
  <link rel="stylesheet" href="./textbox-demo.css?v=20260711-component-themes-v1">
  <link rel="stylesheet" href="./numberbox-demo.css?v=20260711-numberbox-demo-v1">
</head>
<body class="fg-theme-default">
  <main class="textbox-demo-page">
    <aside class="textbox-demo-nav" aria-label="NumberBox examples">
      <h1>NumberBox</h1>
      <label class="textbox-demo-theme-label" for="componentThemeInput">主題</label>
      <select id="componentThemeInput" class="textbox-demo-theme-select"></select>
      <a href="#basic">Basic</a>
      <a href="#range">Number Range</a>
      <a href="#format">Format NumberBox</a>
      <a href="#fluid">Fluid NumberBox</a>
    </aside>

    <section class="textbox-demo-content">
      <header class="textbox-demo-heading">
        <p>FabUI component</p>
        <h2>fabui.NumberBox</h2>
      </header>

      <article id="basic" class="textbox-demo-card">
        <h3>Basic NumberBox</h3>
        <p>只接受數字，離開輸入框時依 precision 修正數值。</p>
        <div class="numberbox-demo-stack">
          <input id="numberboxPrice" value="234.56">
          <input id="numberboxAmount" value="100">
          <input id="numberboxDiscount" value="20">
        </div>
      </article>

      <article id="range" class="textbox-demo-card">
        <h3>Number Range</h3>
        <p>使用 min 與 max 將輸入限制在指定範圍。</p>
        <div class="numberbox-demo-stack">
          <input id="numberboxRangeAmount" placeholder="10 - 90">
          <input id="numberboxWeight" placeholder="10 - 90">
          <input id="numberboxAge" placeholder="0 - 100">
        </div>
      </article>

      <article id="format" class="textbox-demo-card">
        <h3>Format NumberBox</h3>
        <p>支援群組符號、小數符號、prefix 與 suffix。</p>
        <div class="numberbox-demo-stack numberbox-format-stack">
          <input id="numberboxUs" value="1234567.89">
          <input id="numberboxFrance" value="1234567.89">
          <input id="numberboxUsd" value="1234567.89">
          <input id="numberboxEurPrefix" value="1234567.89">
          <input id="numberboxEurSuffix" value="1234567.89">
        </div>
      </article>

      <article id="fluid" class="textbox-demo-card numberbox-fluid-card">
        <h3>Fluid NumberBox</h3>
        <p>NumberBox 寬度可以使用百分比。</p>
        <div class="numberbox-demo-stack">
          <input id="numberboxFluidFull" value="234.56">
          <input id="numberboxFluidHalf" value="100">
        </div>
      </article>
    </section>
  </main>

  <script type="module">
    import fabui from '../src/fabui.js?v=20260711-component-themes-v1';

    window.fabui = fabui;
    await import('./component-theme.js?v=20260711-component-themes-v1');
    await import('./numberbox-demo.js?v=20260711-shared-editor-definitions-v1');
  </script>
</body>
</html>
