    <path d="M28 62C28 41.01 41.01 28 62 28h72c20.99 0 34 13.01 34 34v56c0 20.99-13.01 34-34 34H62c-20.99 0-34-13.01-34-34V62Z" fill="url(#fg-mark-gradient)"/>
