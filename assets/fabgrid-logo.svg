    <path d="M44 132h38M34 108h32M42 84h24" stroke="#bae6fd" stroke-width="8" stroke-linecap="round" opacity="0.9"/>
    <path d="M82 126h64c9.94 0 18-8.06 18-18V78" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" opacity="0.9"/>
    <path d="M138 72l26 6-18 20-8-26Z" fill="#ffffff" opacity="0.96"/>
  </g>

  <g fill="#0f172a">
    <text x="206" y="94" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="58" font-weight="800">FabGrid</text>
    <text x="209" y="126" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#475569">Performance-first JavaScript data grid</text>
