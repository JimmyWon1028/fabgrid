<svg xmlns="http://www.w3.org/2000/svg" width="720" height="180" viewBox="0 0 720 180" role="img" aria-labelledby="title desc">
  <title id="title">FabGrid logo</title>
  <desc id="desc">A fast data grid mark with a FabGrid wordmark.</desc>
  <defs>
    <linearGradient id="fg-mark-gradient" x1="24" y1="24" x2="156" y2="156" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0ea5e9"/>
      <stop offset="0.54" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="fg-accent-gradient" x1="48" y1="46" x2="138" y2="136" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#dbeafe" stop-opacity="0.72"/>
    </linearGradient>
    <filter id="fg-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="720" height="180" fill="#ffffff"/>

