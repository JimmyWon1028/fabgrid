    <rect x="10" y="10" width="18" height="10" rx="2" fill="#0ea5e9"/>
    <rect x="32" y="10" width="18" height="10" rx="2" fill="#2563eb"/>
    <rect x="54" y="10" width="18" height="10" rx="2" fill="#14b8a6"/>
    <rect x="10" y="26" width="18" height="10" rx="2" fill="#cbd5e1"/>
    <rect x="32" y="26" width="18" height="10" rx="2" fill="#cbd5e1"/>
    <rect x="54" y="26" width="18" height="10" rx="2" fill="#cbd5e1"/>
