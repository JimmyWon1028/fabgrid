      function readStoredZipEntry(bytes, targetName) {
        var decoder = new TextDecoder();
        var offset = 0;
        var nameLength;
        var extraLength;
        var compressedSize;
        var name;
        while (offset < bytes.length && readUint32(bytes, offset) === 0x04034b50) {
          compressedSize = readUint32(bytes, offset + 18);
          nameLength = readUint16(bytes, offset + 26);
          extraLength = readUint16(bytes, offset + 28);
          name = decoder.decode(bytes.slice(offset + 30, offset + 30 + nameLength));
          offset += 30 + nameLength + extraLength;
          if (name === targetName) {
            return decoder.decode(bytes.slice(offset, offset + compressedSize));
          }
          offset += compressedSize;
        }
        return '';

          x = Math.min(Math.max(rect.left + 2, 1), window.innerWidth - 2);

          if (rect.bottom > gutterTop + 1 && isTopElement(nodes[i], x, y)) {

        return leaks;

        var rect;
        var x;

        for (i = 0; i < nodes.length; i += 1) {
          rect = nodes[i].getBoundingClientRect();
          if (rect.top < gutterTop && rect.bottom > rect.top) {
            x = Math.min(Math.max(rect.left + 2, 1), window.innerWidth - 2);
            y = Math.min(Math.max(Math.min(rect.bottom - 1, gutterTop - 1), 1), window.innerHeight - 2);
            if (isTopElement(nodes[i], x, y)) {

            }
          }
        }
        return Math.round(gutterTop - maxBottom);

        var top = document.elementFromPoint(x, y);
        return top === node || (top && node.contains(top));
