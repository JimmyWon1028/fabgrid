<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>RadioButton source smoke</title>
  <link rel="stylesheet" href="../src/fabui.css?v=20260719-radiobutton-v1">
</head>
<body class="fg-theme-default">
  <form id="radiobutton-smoke-form">
    <input id="radiobutton-smoke-a" class="original-radio" type="radio" name="fruit" value="original">
    <input id="radiobutton-smoke-b" type="radio" name="fruit" value="banana">
  </form>
  <pre id="result">{"complete":false}</pre>
  <script type="module">
    import fabui from '../src/fabui.js?v=20260719-radiobutton-v1';

    var inputA = document.getElementById('radiobutton-smoke-a');
    var inputB = document.getElementById('radiobutton-smoke-b');
    var form = document.getElementById('radiobutton-smoke-form');
    var result = document.getElementById('result');
    var changes = 0;
    var checks = {};
    var radioA;
    var radioB;

    try {
      radioA = new fabui.RadioButton(inputA, {
        label: 'Apple:',
        value: 'apple',
        checked: true,
        locale: 'zh-TW',
        onChange: function() {
          changes += 1;
        }
      });
      radioB = new fabui.RadioButton(inputB, {
        label: 'Banana:',
        onChange: function() {
          changes += 1;
        }
      });
      checks.published = typeof fabui.RadioButton === 'function';
      checks.registered = fabui.Control.getControl(inputA) === radioA;
      checks.nativeInput = inputA.type === 'radio' &&
        inputA.closest('.fui-radiobutton') &&
        inputA.labels.length === 1;
      checks.initial = radioA.isChecked() === true &&
        radioA.getValue() === 'apple' &&
        new FormData(form).get('fruit') === 'apple';
      radioB.check();
      checks.group = radioA.isChecked() === false &&
        radioB.isChecked() === true &&
        new FormData(form).get('fruit') === 'banana' &&
        changes === 2;
      radioB.clear();
      checks.clear = radioB.isChecked() === false &&
        new FormData(form).get('fruit') === null;
      radioA.setOptions({
        label: 'Updated',
        labelPosition: 'after',
        width: 28,
        height: 28
      });
      checks.runtime = inputA.closest('.fui-radiobutton').classList.contains('fui-radiobutton-label-after') &&
        inputA.closest('.fui-radiobutton').querySelector('.fui-radiobutton-label').textContent === 'Updated' &&
        inputA.closest('.fui-radiobutton-control').style.width === '28px';
      radioA.setLocale('zh-CN').setTheme('black');
      checks.localeTheme = inputA.closest('.fui-radiobutton').classList.contains('fg-theme-black');
      radioB.dispose();
      radioA.dispose();
      checks.disposed = fabui.Control.getControl(inputA) === null &&
        inputA.className === 'original-radio' &&
        inputA.value === 'original' &&
        inputA.checked === false &&
        inputA.parentElement === form;
      checks.complete = Object.keys(checks).every(function(key) {
        return checks[key] === true;
      });
    } catch (error) {
      checks.error = error && error.stack ? error.stack : String(error);
      checks.complete = false;
    }
    result.textContent = JSON.stringify(checks);
    document.title = checks.complete ? 'PASS RadioButton source smoke' : 'FAIL RadioButton source smoke';
  </script>
</body>
</html>
